<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expédition Loire 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fdfcfb; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .number-marker { width: 28px; height: 28px; background: white; border: 2px solid #4f46e5; border-radius: 50%; color: #4f46e5; font-weight: 900; text-align: center; line-height: 24px; font-size: 11px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .plan-b-marker { width: 28px; height: 28px; background: #fff7ed; border: 2px solid #f97316; border-radius: 50%; color: #f97316; font-weight: 900; text-align: center; line-height: 24px; font-size: 14px; }
        .home-marker { width: 34px; height: 34px; background: #ef4444; border: 2px solid white; border-radius: 50%; color: white; text-align: center; line-height: 30px; font-size: 16px; box-shadow: none !important; }
        .leaflet-popup-content-wrapper { border-radius: 1rem; padding: 0; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; }
        .leaflet-popup-close-button { color: white !important; z-index: 10; font-size: 16px !important; top: 5px !important; right: 5px !important; }
        .custom-scroll::-webkit-scrollbar { display: none; }
        .custom-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && lucide.icons[name]) {
                    containerRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.className = className;
                    containerRef.current.appendChild(iconElement);
                    lucide.createIcons({ icons: { [name]: lucide.icons[name] }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [data] = useState(window.VOYAGE_DATA);
            const [selectedDayId, setSelectedDayId] = useState(null);
            const leafletMap = useRef(null);
            const layersRef = useRef({ markers: null, routes: null });

            useEffect(() => {
                if (!leafletMap.current) {
                    leafletMap.current = L.map('map', { zoomControl: false }).setView([47.3, 0.6], 10);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafletMap.current);
                    layersRef.current.markers = L.layerGroup().addTo(leafletMap.current);
                    layersRef.current.routes = L.layerGroup().addTo(leafletMap.current);
                }
            }, []);

            useEffect(() => {
                if (!data) return;
                const { markers, routes } = layersRef.current;
                markers.clearLayers(); routes.clearLayers();
                const officialIds = new Set(data.days.flatMap(d => d.route));
                const daysToDisplay = selectedDayId !== null ? [data.days.find(d => d.id === selectedDayId)] : data.days;

                daysToDisplay.forEach(day => {
                    const mainPoints = day.route.map(id => data.points_of_interest.find(p => p.id === id)).filter(Boolean);
                    const planBPoints = data.points_of_interest.filter(p => !officialIds.has(p.id));
                    const allVisiblePoints = selectedDayId !== null ? [...mainPoints, ...planBPoints] : data.points_of_interest;

                    const coords = mainPoints.map(p => p.coords);
                    if (coords.length > 1) {
                        L.polyline(coords, { color: day.color, weight: 4, opacity: 0.6 }).addTo(routes);
                    }

                    allVisiblePoints.forEach((p, i) => {
                        const isHome = p.id === "location";
                        const isPlanB = !officialIds.has(p.id);
                        const icon = L.divIcon({ 
                            className: isHome ? 'home-marker' : (isPlanB ? 'plan-b-marker' : 'number-marker'), 
                            html: isHome ? '⛺' : (isPlanB ? '🌟' : i),
                            iconSize: isHome ? [34, 34] : [28, 28]
                        });
                        const popupHtml = `
                            <div class="flex flex-col overflow-hidden">
                                ${p.img ? `<img src="${p.img}" class="w-full h-24 object-cover" />` : ''}
                                <div class="p-3 bg-white">
                                    <div class="font-black text-xs text-slate-800 leading-tight">${p.name}</div>
                                    <div class="text-[9px] text-slate-500 mt-1 flex items-start gap-1">
                                        <i data-lucide="map-pin" class="w-3 h-3 shrink-0 text-slate-400 mt-0.5"></i>
                                        ${p.addr}
                                    </div>
                                    ${isPlanB ? '<div class="mt-2 text-[8px] font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full w-fit uppercase tracking-tighter">Option</div>' : ''}
                                </div>
                            </div>
                        `;
                        const marker = L.marker(p.coords, { icon }).addTo(markers).bindPopup(popupHtml);
                        marker.on('popupopen', () => lucide.createIcons());
                    });
                });
            }, [data, selectedDayId]);

            const activeDay = data.days.find(d => d.id === selectedDayId);

            return (
                <div className="relative w-screen h-screen">
                    <div id="map"></div>
                    <div className="absolute top-3 left-3 z-[1000] flex flex-col gap-1.5">
                        <button onClick={() => setSelectedDayId(null)} className={`w-10 h-10 rounded-xl shadow-lg font-black text-[9px] border-2 transition-all ${selectedDayId === null ? 'bg-indigo-600 text-white border-indigo-400' : 'bg-white text-slate-600 border-white hover:bg-slate-50'}`}>TOUT</button>
                        {data.days.map(day => (
                            <button key={day.id} onClick={() => setSelectedDayId(day.id)} className={`w-10 h-10 rounded-xl shadow-lg flex flex-col items-center justify-center border-2 transition-all ${selectedDayId === day.id ? 'bg-slate-800 text-white border-slate-700' : 'bg-white text-slate-600 border-white'}`}>
                                <div className="w-1.5 h-1.5 rounded-full mb-0.5" style={{ background: day.color }}></div>
                                <span className="text-[8px] font-black uppercase tracking-tighter">{day.dayName.slice(0,3)}</span>
                            </button>
                        ))}
                    </div>
                    {selectedDayId !== null && (
                        <div className="absolute bottom-4 left-4 right-4 z-[1000] md:max-w-sm md:left-auto animate-in slide-in-from-bottom-5 duration-300 text-slate-800">
                             <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 flex flex-col max-h-[60vh]">
                                <div className="p-4 flex justify-between items-center bg-white border-b border-slate-50">
                                    <div><h3 className="font-black text-base leading-none">{activeDay.title}</h3><p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-wider">{activeDay.dayName}</p></div>
                                    <button onClick={() => setSelectedDayId(null)} className="p-1.5 bg-slate-50 rounded-full text-slate-400 hover:bg-slate-100 transition-colors"><Icon name="X" className="w-5 h-5"/></button>
                                </div>
                                <div className="p-3 overflow-y-auto custom-scroll space-y-2.5 bg-slate-50/50">
                                    {activeDay.route.map((pId, i) => {
                                        const p = data.points_of_interest.find(x => x.id === pId);
                                        if (!p) return null;
                                        const gpsUrl = `https://www.google.com/maps/dir/?api=1&destination=${p.coords[0]},${p.coords[1]}`;
                                        return (
                                            <div key={i} className="relative w-full aspect-[16/6] rounded-xl overflow-hidden shadow-sm border border-white group">
                                                <img src={p.img} className="absolute inset-0 w-full h-full object-cover" alt={p.name}/>
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                                <div className="absolute inset-0 p-3 flex flex-col justify-end text-white">
                                                    <div className="flex items-end justify-between gap-3">
                                                        <div className="min-w-0 flex-1">
                                                            <h4 className="font-black text-xs uppercase tracking-tight drop-shadow-md truncate">{p.name}</h4>
                                                            <div className="flex gap-2 text-[8px] font-bold uppercase opacity-90 mt-0.5 drop-shadow-sm truncate"><span>{p.dist} — {p.dur}</span></div>
                                                        </div>
                                                        <a href={gpsUrl} target="_blank" className="p-2 bg-white/20 backdrop-blur-md rounded-lg text-white shadow-xl hover:bg-white/40 transition-colors shrink-0"><Icon name="Navigation2" className="w-3.5 h-3.5" /></a>
                                                    </div>
                                                    {p.bookingTips && <div className="mt-1 py-0.5 px-2 bg-amber-500/90 backdrop-blur-sm rounded border border-white/20 text-white shadow-sm w-full"><p className="text-[7px] font-bold leading-tight uppercase tracking-tighter">⚠️ {p.bookingTips}</p></div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
