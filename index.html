<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Vacances Val de Loire</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Composant Icon simple pour utiliser Lucide dans le DOM
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const iconData = lucide.icons[name];
                    if (iconData) {
                        const svg = lucide.createIcons({
                            icons: { [name]: iconData },
                            nameAttr: 'data-lucide'
                        });
                    }
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(0);
            const [userQuery, setUserQuery] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState("");

            const apiKey = ""; // Fourni par l'environnement d'exécution

            const itinerary = [
                {
                    dayName: "Samedi",
                    title: "Le Voyage & Arrivée",
                    type: "Repos",
                    location: "La Rochelle ➔ La Chapelle",
                    description: "Départ de la côte pour rejoindre les bords de Loire. Pause pique-nique en chemin pour couper la route.",
                    activities: [
                        { name: "Départ de La Rochelle (Prévu à 13h30)", addr: "17000 La Rochelle", img: null },
                        { name: "Pause Pique-nique (Aire de Repos ou Niort)", addr: "79000 Niort (ou bords de Sèvre)", img: "https://images.unsplash.com/photo-1594498653385-d5172c532c00?auto=format&fit=crop&q=80&w=800" },
                        { name: "Arrivée au gîte (Prévu à 17h00)", addr: "37140 La Chapelle-sur-Loire", img: null }
                    ],
                    mapQuery: "Niort to La Chapelle-sur-Loire",
                    color: "bg-emerald-100"
                },
                {
                    dayName: "Dimanche",
                    title: "L'Ouest Immédiat",
                    type: "Activité",
                    location: "Ussé & Azay-le-Rideau",
                    description: "Des joyaux à moins de 30 minutes du gîte pour commencer en douceur.",
                    activities: [
                        { name: "Château d'Ussé", addr: "37420 Rigny-Ussé", img: "https://images.unsplash.com/photo-1590059392604-0c5875883015?auto=format&fit=crop&q=80&w=800" },
                        { name: "Château de Langeais", addr: "Place Pierre de Brosse, 37130 Langeais", img: "https://images.unsplash.com/photo-1628153400283-7729f635652f?auto=format&fit=crop&q=80&w=800" },
                        { name: "Château d'Azay-le-Rideau", addr: "Rue de Balzac, 37190 Azay-le-Rideau", img: "https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Château d'Ussé, Langeais, Château d'Azay-le-Rideau",
                    color: "bg-blue-100"
                },
                {
                    dayName: "Lundi",
                    title: "Le Grand Safari",
                    type: "Activité",
                    location: "La Flèche",
                    description: "Une journée consacrée à la faune dans l'un des plus beaux zoos d'Europe.",
                    activities: [
                        { name: "Zoo de la Flèche", addr: "Le Tertre Rouge, 72200 La Flèche", img: "https://images.unsplash.com/photo-1503919005314-30d93d07d823?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Zoo de la Flèche, France",
                    color: "bg-orange-100"
                },
                {
                    dayName: "Mardi",
                    title: "Histoire & Terroir",
                    type: "Activité",
                    location: "Fontevraud & Vouvray",
                    description: "Matinée majestueuse à l'Abbaye de Fontevraud (à 20 min du gîte) et après-midi dégustation à Vouvray.",
                    activities: [
                        { name: "Abbaye Royale de Fontevraud", addr: "49590 Fontevraud-l'Abbaye", img: "https://images.unsplash.com/photo-1599424423956-6644f776274e?auto=format&fit=crop&q=80&w=800" },
                        { name: "Caves de Vouvray", addr: "38 Rue de la Vallée Coquette, 37210 Vouvray", img: "https://images.unsplash.com/photo-1516594915697-87eb3b1c14ea?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Abbaye de Fontevraud, Vouvray",
                    color: "bg-emerald-100"
                },
                {
                    dayName: "Mercredi",
                    title: "La Vallée des Rois",
                    type: "Activité",
                    location: "Chenonceau & Amboise",
                    description: "Le secteur d'Amboise, concentré d'histoire et de génie.",
                    activities: [
                        { name: "Château de Chenonceau", addr: "37150 Chenonceaux", img: "https://images.unsplash.com/photo-1564397241838-5f5033767222?auto=format&fit=crop&q=80&w=800" },
                        { name: "Le Clos Lucé", addr: "2 Rue du Clos Lucé, 37400 Amboise", img: "https://images.unsplash.com/photo-1505881502353-a1986add3762?auto=format&fit=crop&q=80&w=800" },
                        { name: "Parc des Mini-Châteaux", addr: "Boulevard Saint-Denis Hors, 37400 Amboise", img: "https://images.unsplash.com/photo-1493246507139-91e8bef99c17?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Château de Chenonceau, Amboise, France",
                    color: "bg-blue-100"
                },
                {
                    dayName: "Jeudi",
                    title: "Les Géants du Loir-et-Cher",
                    type: "Activité",
                    location: "Chambord & Blois",
                    description: "Le trajet le plus long de la semaine, mais pour les sites les plus impressionnants.",
                    activities: [
                        { name: "Château de Chambord", addr: "41250 Chambord", img: "https://images.unsplash.com/photo-1605553229605-779899f80a2b?auto=format&fit=crop&q=80&w=800" },
                        { name: "Château Royal de Blois", addr: "6 Place du Château, 41000 Blois", img: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Château de Chambord, Blois, France",
                    color: "bg-blue-100"
                },
                {
                    dayName: "Vendredi",
                    title: "Jardins & Forteresse",
                    type: "Activité",
                    location: "Villandry & Montbazon",
                    description: "Focus sur l'esthétique des jardins et l'immersion médiévale.",
                    activities: [
                        { name: "Château de Villandry", addr: "3 rue Principale, 37510 Villandry", img: "https://images.unsplash.com/photo-1621274154181-e28373b52d43?auto=format&fit=crop&q=80&w=800" },
                        { name: "Forteresse de Montbazon", addr: "Chemin de la Forteresse, 37250 Montbazon", img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=800" }
                    ],
                    mapQuery: "Château de Villandry, Forteresse de Montbazon",
                    color: "bg-blue-100"
                }
            ];

            const optionalVisits = [
                { name: "Château de Saumur", addr: "49400 Saumur", reason: "Le plus proche (15 min). Vue incroyable.", img: "https://images.unsplash.com/photo-1628153400283-7729f635652f?auto=format&fit=crop&q=80&w=800" },
                { name: "Forteresse de Chinon", addr: "2 rue du Château, 37500 Chinon", reason: "Immersion médiévale historique.", img: "https://images.unsplash.com/photo-1590059392604-0c5875883015?auto=format&fit=crop&q=80&w=800" },
                { name: "Montsoreau & Candes", addr: "49730 Montsoreau", reason: "Plus beaux villages de France.", img: "https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&q=80&w=800" },
                { name: "Château du Rivau", addr: "37120 Lémeré", reason: "Jardins de contes de fées.", img: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&q=80&w=800" }
            ];

            const askAssistant = async () => {
                if (!userQuery.trim()) return;
                setIsLoading(true);
                setError("");
                setAiResponse("");

                const systemPrompt = "Tu es un guide expert du Val de Loire. Réponds de manière concise et passionnante aux questions de ce touriste qui loge à La Chapelle-sur-Loire.";
                
                const callApi = async (retryCount = 0) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });
                        if (!response.ok) throw new Error('Erreur API');
                        const data = await response.json();
                        setAiResponse(data.candidates?.[0]?.content?.parts?.[0]?.text || "Désolé, je n'ai pas pu générer de réponse.");
                    } catch (err) {
                        if (retryCount < 5) {
                            setTimeout(() => callApi(retryCount + 1), Math.pow(2, retryCount) * 1000);
                        } else {
                            setError("L'assistant est temporairement indisponible.");
                        }
                    } finally {
                        if (retryCount === 0 || retryCount >= 5) setIsLoading(false);
                    }
                };
                callApi();
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 bg-white border-r border-slate-200 overflow-y-auto p-4 flex-shrink-0 flex flex-col shadow-xl z-20 custom-scrollbar">
                        <h1 className="text-xl font-bold mb-6 flex items-center gap-2 text-indigo-700">
                            <Icon name="Calendar" className="w-6 h-6" />
                            Val de Loire
                        </h1>
                        
                        <nav className="space-y-2 flex-1">
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-2">Planning Semaine</div>
                            {itinerary.map((day, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => { setActiveTab('itinerary'); setActiveDay(idx); }}
                                    className={`w-full text-left p-3 rounded-xl transition-all border ${
                                        activeTab === 'itinerary' && activeDay === idx 
                                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' 
                                        : 'bg-white border-transparent hover:bg-slate-50 text-slate-600'
                                    }`}
                                >
                                    <div className="flex items-center justify-between mb-1">
                                        <span className={`text-[10px] font-bold uppercase ${activeTab === 'itinerary' && activeDay === idx ? 'text-indigo-100' : 'text-slate-400'}`}>
                                            {day.dayName}
                                        </span>
                                        {day.type === "Repos" ? <Icon name="Sun" className="w-3 h-3" /> : <Icon name="Car" className="w-3 h-3" />}
                                    </div>
                                    <div className="font-bold text-sm truncate">{day.title}</div>
                                </button>
                            ))}
                            
                            <div className="mt-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-2">En cas d'imprévu</div>
                            <button
                                onClick={() => setActiveTab('optional')}
                                className={`w-full text-left p-3 rounded-xl transition-all border ${
                                    activeTab === 'optional'
                                    ? 'bg-amber-500 text-white border-amber-500 shadow-lg' 
                                    : 'bg-white border-transparent hover:bg-slate-50 text-slate-600'
                                }`}
                            >
                                <div className="flex items-center justify-between mb-1">
                                    <span className={`text-[10px] font-bold uppercase ${activeTab === 'optional' ? 'text-amber-100' : 'text-slate-400'}`}>
                                        Options
                                    </span>
                                    <Icon name="Lightbulb" className="w-3 h-3" />
                                </div>
                                <div className="font-bold text-sm">Visites Optionnelles</div>
                            </button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="flex-1 p-4 md:p-6 overflow-y-auto space-y-6 custom-scrollbar">
                            
                            {activeTab === 'itinerary' ? (
                                <section className={`p-6 rounded-3xl ${itinerary[activeDay].color} border border-white/50 shadow-sm animate-in fade-in duration-300`}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="px-3 py-1 bg-white/60 rounded-full text-[10px] font-bold uppercase text-slate-700">
                                            {itinerary[activeDay].type}
                                        </span>
                                        <span className="text-slate-600 text-xs flex items-center gap-1 font-medium">
                                            <Icon name="MapPin" className="w-3 h-3" /> {itinerary[activeDay].location}
                                        </span>
                                    </div>
                                    <h2 className="text-2xl font-black mb-3 tracking-tight">
                                        {itinerary[activeDay].dayName} : {itinerary[activeDay].title}
                                    </h2>
                                    <p className="text-slate-700 mb-6 text-sm leading-relaxed max-w-3xl">{itinerary[activeDay].description}</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {itinerary[activeDay].activities.map((act, i) => (
                                            <div key={i} className="bg-white/60 backdrop-blur-sm rounded-2xl border border-white/40 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                                {act.img && (
                                                    <div className="h-32 w-full overflow-hidden">
                                                        <img src={act.img} alt={act.name} className="w-full h-full object-cover" />
                                                    </div>
                                                )}
                                                <div className="p-4">
                                                    <div className="font-bold text-sm text-slate-900 mb-2 flex items-center gap-1.5">
                                                        {act.name.includes("Pique-nique") && <Icon name="Coffee" className="w-3 h-3 text-emerald-600" />}
                                                        {act.name}
                                                    </div>
                                                    <div className="flex items-start gap-1.5 text-[11px] text-slate-600 bg-white/50 p-2 rounded-lg border border-white/20 font-mono select-all">
                                                        <Icon name="Navigation" className="w-3 h-3 mt-0.5 text-indigo-500 flex-shrink-0" />
                                                        {act.addr}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            ) : (
                                <section className="p-6 rounded-3xl bg-amber-50 border border-amber-100 shadow-sm animate-in zoom-in-95 duration-300">
                                    <h2 className="text-2xl font-black mb-2 tracking-tight text-amber-900">Visites de remplacement</h2>
                                    <p className="text-amber-800/80 mb-6 text-sm">Pépites de proximité en cas d'imprévu ou de fatigue.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {optionalVisits.map((visit, i) => (
                                            <div key={i} className="bg-white/80 rounded-2xl border border-amber-200 overflow-hidden flex flex-col sm:flex-row h-full">
                                                <div className="w-full sm:w-32 h-32 sm:h-auto flex-shrink-0">
                                                    <img src={visit.img} alt={visit.name} className="w-full h-full object-cover" />
                                                </div>
                                                <div className="p-4 flex flex-col justify-between">
                                                    <div>
                                                        <div className="font-bold text-slate-900 text-sm mb-1">{visit.name}</div>
                                                        <p className="text-[11px] text-slate-600 leading-relaxed mb-3">{visit.reason}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1.5 text-[10px] text-slate-500 bg-slate-100 px-2 py-1 rounded border border-slate-200 font-mono w-fit">
                                                        <Icon name="Navigation" className="w-2.5 h-2.5 text-amber-600" />
                                                        {visit.addr}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {/* Assistant Section */}
                            <section className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                                <h3 className="font-bold flex items-center gap-2 text-slate-800 mb-4 text-sm">
                                    <Icon name="Sparkles" className="w-4 h-4 text-amber-500" />
                                    Guide Touristique Intelligent
                                </h3>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={userQuery}
                                        onChange={(e) => setUserQuery(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && askAssistant()}
                                        placeholder="Posez une question sur vos visites..." 
                                        className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    />
                                    <button 
                                        onClick={askAssistant}
                                        disabled={isLoading}
                                        className="bg-indigo-600 text-white p-3 rounded-xl disabled:opacity-50 transition-colors hover:bg-indigo-700 shadow-md"
                                    >
                                        {isLoading ? <Icon name="Loader2" className="w-5 h-5 animate-spin" /> : <Icon name="Send" className="w-5 h-5" />}
                                    </button>
                                </div>
                                {aiResponse && (
                                    <div className="mt-4 p-4 bg-indigo-50 border border-indigo-100 rounded-2xl text-sm leading-relaxed text-slate-700 animate-in fade-in slide-in-from-top-2">
                                        <div className="font-bold text-indigo-600 text-[10px] uppercase mb-1 tracking-wider">Réponse du guide :</div>
                                        {aiResponse}
                                    </div>
                                )}
                                {error && (
                                    <div className="mt-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-xs">
                                        {error}
                                    </div>
                                )}
                            </section>
                        </div>

                        {/* Map Area */}
                        <div className="h-64 md:h-80 bg-slate-200 relative border-t border-slate-200">
                            <iframe
                                width="100%"
                                height="100%"
                                style={{ border: 0 }}
                                loading="lazy"
                                src={`https://www.google.com/maps/embed/v1/search?key=${apiKey}&q=${encodeURIComponent(activeTab === 'itinerary' ? itinerary[activeDay].mapQuery : "Saumur, Chinon, France")}&zoom=${activeTab === 'itinerary' ? 8 : 10}`}
                            ></iframe>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
