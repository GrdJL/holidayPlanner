<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expédition Loire 2026</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="./data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fdfcfb; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .number-marker {
            width: 32px; height: 32px; background: white; border: 1.5px solid #4f46e5;
            border-radius: 50%; color: #4f46e5; font-weight: 900; text-align: center;
            line-height: 29px; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .plan-b-marker {
            width: 32px; height: 32px; background: #fff7ed; border: 1.5px solid #f97316;
            border-radius: 50%; color: #f97316; font-weight: 900; text-align: center;
            line-height: 29px; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .home-marker {
            width: 40px; height: 40px; background: #ef4444; border: 1.5px solid white;
            border-radius: 50%; color: white; font-weight: 900; text-align: center;
            line-height: 37px; font-size: 18px; box-shadow: none !important;
        }
        
        .leaflet-popup-content-wrapper { border-radius: 1.5rem; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; }
        
        .custom-scroll::-webkit-scrollbar { display: none; }
        .custom-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && lucide.icons[name]) {
                    containerRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.className = className;
                    containerRef.current.appendChild(iconElement);
                    lucide.createIcons({ icons: { [name]: lucide.icons[name] }, nameAttr: 'data-lucide' });
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [data] = useState(window.VOYAGE_DATA);
            const [selectedDayId, setSelectedDayId] = useState(null);
            
            const [aiResponse, setAiResponse] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            
            const leafletMap = useRef(null);
            const layersRef = useRef({ markers: null, routes: null });

            useEffect(() => {
                if (!leafletMap.current) {
                    leafletMap.current = L.map('map', { zoomControl: false }).setView([47.3, 0.6], 9);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafletMap.current);
                    layersRef.current.markers = L.layerGroup().addTo(leafletMap.current);
                    layersRef.current.routes = L.layerGroup().addTo(leafletMap.current);
                }
            }, []);

            useEffect(() => {
                if (!data) return;
                const { markers, routes } = layersRef.current;
                markers.clearLayers(); routes.clearLayers();

                const daysToDisplay = selectedDayId !== null ? [data.days.find(d => d.id === selectedDayId)] : data.days;

                daysToDisplay.forEach(day => {
                    const mainPoints = day.route.map(id => data.points_of_interest.find(p => p.id === id)).filter(Boolean);
                    const planBPoints = data.points_of_interest.filter(p => p.type === "plan_b");
                    
                    // On combine les points d'itinéraire et les points Plan B pour les marqueurs
                    const allVisiblePoints = [...mainPoints, ...planBPoints];
                    const coords = mainPoints.map(p => p.coords);

                    if (coords.length > 1) {
                        L.polyline(coords, { color: day.color, weight: 3, opacity: 0.5 }).addTo(routes);
                    }

                    allVisiblePoints.forEach((p, i) => {
                        const isHome = p.id === "loc"; // Corrigé pour correspondre à l'ID de La Chapelle
                        const isPlanB = p.type === "plan_b";
                        
                        const icon = L.divIcon({ 
                            className: isHome ? 'home-marker' : (isPlanB ? 'plan-b-marker' : 'number-marker'), 
                            html: isHome ? '⛺' : (isPlanB ? '🌟' : i),
                            iconSize: isHome ? [40, 40] : [32, 32]
                        });
                        
                        const popupHtml = `
                            <div class="flex flex-col">
                                ${p.img ? `<img src="${p.img}" class="w-full h-24 object-cover">` : ''}
                                <div class="p-3">
                                    ${isPlanB ? '<span class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold mb-1 inline-block">PLAN B</span>' : ''}
                                    <div class="font-black text-sm text-slate-800">${p.name}</div>
                                    <div class="text-[10px] text-indigo-600 font-bold mt-1 tracking-tight">
                                        ⏱️ ${p.dur} (${p.dist})
                                    </div>
                                    ${p.reason ? `<div class="text-[9px] text-slate-500 mt-1 italic">${p.reason}</div>` : ''}
                                </div>
                            </div>
                        `;
                        L.marker(p.coords, { icon }).addTo(markers).bindPopup(popupHtml);
                    });
                });
            }, [data, selectedDayId]);

            const askAssistant = async (query) => {
                if (!query.trim()) return;
                setIsLoading(true); setAiResponse(""); setShowAiModal(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${data.config.apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: query }] }], 
                            systemInstruction: { parts: [{ text: "Expert guide Val de Loire." }] } 
                        })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text || "Indisponible.");
                } catch (e) { 
                    setAiResponse("Désolé, une erreur est survenue."); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const activeDay = data.days.find(d => d.id === selectedDayId);

            return (
                <div className="relative w-screen h-screen">
                    <div id="map"></div>
                    
                    <div className="absolute top-4 left-4 z-[1000] flex flex-col gap-2">
                        <button onClick={() => setSelectedDayId(null)} className={`px-4 py-3 rounded-2xl shadow-xl font-black text-[11px] border-2 transition-all ${selectedDayId === null ? 'bg-indigo-600 text-white border-indigo-400' : 'bg-white text-slate-600 border-white'}`}>TOUT</button>
                        {data.days.map(day => (
                            <button key={day.id} onClick={() => setSelectedDayId(day.id)} className={`px-4 py-3 rounded-2xl shadow-xl flex flex-col items-center border-2 transition-all ${selectedDayId === day.id ? 'bg-slate-800 text-white border-slate-700' : 'bg-white text-slate-600 border-white'}`}>
                                <div className="w-2 h-2 rounded-full mb-1" style={{ background: day.color }}></div>
                                <span className="text-[10px] font-black uppercase tracking-tighter">{day.dayName.slice(0,3)}</span>
                            </button>
                        ))}
                    </div>

                    {selectedDayId !== null && (
                        <div className="absolute bottom-6 left-6 right-6 z-[1000] md:max-w-md md:left-auto animate-in slide-in-from-bottom-10 duration-500">
                             <div className="bg-white rounded-[2.5rem] shadow-[0_30px_60px_rgba(0,0,0,0.3)] overflow-hidden border border-slate-100 flex flex-col max-h-[85vh]">
                                
                                <div className="p-6 flex justify-between items-center bg-white border-b border-slate-50">
                                    <h3 className="font-black text-2xl text-slate-800 tracking-tight">{activeDay.title}</h3>
                                    <button onClick={() => setSelectedDayId(null)} className="p-2 bg-slate-50 rounded-full text-slate-400 hover:bg-slate-100 transition-colors"><Icon name="X"/></button>
                                </div>

                                <div className="p-4 overflow-y-auto custom-scroll space-y-4 bg-slate-50/30">
                                    {activeDay.route.map((pId, i) => {
                                        const p = data.points_of_interest.find(x => x.id === pId);
                                        if (!p) return null;
                                        
                                        return (
                                            <div key={i} className="relative w-full aspect-[16/10] rounded-[2rem] overflow-hidden group shadow-lg border border-white">
                                                <img src={p.img} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000"/>
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>
                                                
                                                <div className="absolute inset-0 p-6 flex flex-col justify-end text-white">
                                                    <div className="flex items-center gap-4 mb-2">
                                                        <span className={`w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm border backdrop-blur-md shadow-xl ${p.id === "loc" ? 'bg-red-500/80 border-red-400' : 'bg-white/20 border-white/30'}`}>
                                                            {p.id === "loc" ? '⛺' : i}
                                                        </span>
                                                        <h4 className="font-black text-xl uppercase tracking-tight drop-shadow-lg leading-tight">{p.name}</h4>
                                                    </div>
                                                    
                                                    <div className="flex items-center justify-between border-t border-white/20 pt-3 mt-1">
                                                        <div className="flex gap-4 text-[11px] font-black uppercase tracking-widest opacity-90">
                                                            <span className="flex items-center gap-1.5"><Icon name="MapPin" className="w-3.5 h-3.5"/> {p.dist}</span>
                                                            <span className="flex items-center gap-1.5"><Icon name="Clock" className="w-3.5 h-3.5"/> {p.dur}</span>
                                                        </div>
                                                        
                                                        {p.id !== "loc" && (
                                                            <button onClick={() => askAssistant(`Donne moi 3 anecdotes historiques sur ${p.name}`)} className="p-3 bg-amber-500 rounded-2xl text-slate-900 shadow-xl shadow-amber-500/20 hover:scale-110 active:scale-90 transition-all">
                                                                <Icon name="Sparkles" className="w-5 h-5"/>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {showAiModal && (
                        <div className="fixed inset-0 z-[2000] bg-slate-900/95 backdrop-blur-xl p-8 text-white flex flex-col animate-in zoom-in-95 duration-300">
                            <div className="flex justify-between items-center mb-8 max-w-2xl mx-auto w-full">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-amber-500 rounded-xl"><Icon name="Sparkles" className="text-slate-900 w-5 h-5"/></div>
                                    <span className="font-black text-sm uppercase tracking-[0.2em] text-amber-500">Assistant Gemini</span>
                                </div>
                                <button onClick={() => setShowAiModal(false)} className="p-2 text-white/40 hover:text-white"><Icon name="X" className="w-8 h-8"/></button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scroll text-lg leading-relaxed font-medium text-slate-200 max-w-2xl mx-auto w-full">
                                {isLoading ? (
                                    <div className="space-y-4 animate-pulse">
                                        <div className="h-4 bg-white/10 rounded w-3/4"></div>
                                        <div className="h-4 bg-white/10 rounded w-full"></div>
                                        <div className="h-4 bg-white/10 rounded w-5/6"></div>
                                    </div>
                                ) : (
                                    <div className="whitespace-pre-wrap">{aiResponse}</div>
                                )}
                            </div>
                            
                            <div className="mt-8 max-w-2xl mx-auto w-full">
                                <button onClick={() => setShowAiModal(false)} className="w-full py-5 bg-white text-slate-900 rounded-[1.5rem] font-black text-xs uppercase tracking-widest hover:bg-amber-500 transition-colors">Fermer</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
